<body>
  <div id="root"></div>
  <svg width="0" height="0" style="position: absolute; pointer-events: none;" aria-hidden="true">
    <filter id="global-backlight-4" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="4.5"></feColorMatrix>
      <feComposite in="SourceGraphic" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-5" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="4"></feColorMatrix>
      <feComposite in="SourceGraphic" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-5-soft" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="3.5" result="saturated"></feColorMatrix>
      <feComponentTransfer in="saturated" result="faded">
        <feFuncA type="linear" slope="0.8"></feFuncA>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="faded" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-strong" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="5.5"></feColorMatrix>
      <feComposite in="SourceGraphic" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-kolven" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="3.2" result="saturated"></feColorMatrix>
      <feComponentTransfer in="saturated" result="faded">
        <feFuncA type="linear" slope="0.7"></feFuncA>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="faded" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-carousel" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="3.5" result="saturated"></feColorMatrix>
      <feComponentTransfer in="saturated" result="faded">
        <feFuncA type="linear" slope="0.75"></feFuncA>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="faded" operator="over"></feComposite>
    </filter>
    <filter id="global-backlight-20" y="-150%" x="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blurred"></feGaussianBlur>
      <feColorMatrix type="saturate" in="blurred" values="4"></feColorMatrix>
      <feComposite in="SourceGraphic" operator="over"></feComposite>
    </filter>
  </svg>
